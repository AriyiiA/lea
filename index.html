<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>—</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;}
canvas{display:block;position:fixed;inset:0;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, particles = [], mouse = {x: -999, y: -999}, t = 0;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

/* Couleur selon l'heure */
function getPalette(){
  const h = new Date().getHours();
  if(h >= 6 && h < 9){
    /* Aube — rose pâle vers crème */
    return {bg:'#fdf2ee', primary:'#c97060', secondary:'#e8b89a', accent:'#a04840', text:'#3a1a14'};
  } else if(h >= 9 && h < 17){
    /* Jour — blanc cassé, encre */
    return {bg:'#f7f4ef', primary:'#1a1a2e', secondary:'#6b6b8a', accent:'#9b8ea8', text:'#1a1a2e'};
  } else if(h >= 17 && h < 20){
    /* Crépuscule — orangé profond */
    return {bg:'#1a0f0a', primary:'#e8734a', secondary:'#c05030', accent:'#f0a070', text:'#fdf2ee'};
  } else {
    /* Nuit — bleu nuit, argent */
    return {bg:'#060912', primary:'#7090c8', secondary:'#3a4f80', accent:'#b0c8f0', text:'#e8eef8'};
  }
}

let palette = getPalette();

class Particle {
  constructor(){this.reset();}
  reset(){
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.ox = this.x;
    this.oy = this.y;
    this.vx = 0; this.vy = 0;
    this.size = 0.6 + Math.random() * 2.2;
    this.alpha = 0.08 + Math.random() * 0.35;
    this.speed = 0.0003 + Math.random() * 0.0006;
    this.offset = Math.random() * Math.PI * 2;
    this.range = 30 + Math.random() * 80;
    this.type = Math.random(); /* 0-0.6 = point, 0.6-1 = ligne */
  }
  update(t){
    const dx = this.x - mouse.x, dy = this.y - mouse.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const repel = 120;
    if(dist < repel){
      const force = (repel - dist) / repel;
      this.vx += (dx/dist) * force * 1.8;
      this.vy += (dy/dist) * force * 1.8;
    }
    this.vx *= 0.92; this.vy *= 0.92;
    const angle = this.offset + t * this.speed;
    this.x = this.ox + Math.cos(angle) * this.range * 0.4 + this.vx;
    this.y = this.oy + Math.sin(angle * 0.7) * this.range * 0.3 + this.vy;
  }
  draw(ctx, color, nextParticle){
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.globalAlpha = this.alpha;
    ctx.fill();
    /* Ligne vers voisin si proches */
    if(nextParticle){
      const dx = nextParticle.x - this.x, dy = nextParticle.y - this.y;
      const d = Math.sqrt(dx*dx+dy*dy);
      if(d < 140){
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(nextParticle.x, nextParticle.y);
        ctx.strokeStyle = color;
        ctx.globalAlpha = this.alpha * (1 - d/140) * 0.5;
        ctx.lineWidth = 0.4;
        ctx.stroke();
      }
    }
  }
}

/* Grandes formes ondulantes en fond */
class WaveShape {
  constructor(i){
    this.i = i;
    this.speed = 0.00015 + i * 0.00008;
    this.amp = H * (0.08 + i * 0.04);
    this.y = H * (0.2 + i * 0.2);
  }
  draw(ctx, t, color){
    ctx.beginPath();
    ctx.moveTo(0, H);
    for(let x = 0; x <= W; x += 4){
      const y = this.y
        + Math.sin(x * 0.003 + t * this.speed + this.i) * this.amp
        + Math.sin(x * 0.007 + t * this.speed * 1.4 + this.i * 2) * this.amp * 0.4;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.globalAlpha = 0.04 - this.i * 0.008;
    ctx.fill();
  }
}

let waves = [];
function init(){
  resize();
  palette = getPalette();
  particles = Array.from({length: Math.min(120, Math.floor(W*H/8000))}, () => new Particle());
  waves = [0,1,2,3].map(i => new WaveShape(i));
}

/* Transition de palette */
let currentBg = palette.bg;
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
function lerp(a,b,t){return a+(b-a)*t;}
function rgbToHex(r,g,b){return '#'+[r,g,b].map(v=>Math.round(v).toString(16).padStart(2,'0')).join('');}

let bgFrom = hexToRgb(palette.bg), bgTo = hexToRgb(palette.bg);
let bgT = 1;

function loop(ts){
  requestAnimationFrame(loop);
  t = ts;

  /* Check heure toutes les minutes */
  const newPal = getPalette();
  if(newPal.bg !== palette.bg){
    bgFrom = hexToRgb(currentBg);
    bgTo = hexToRgb(newPal.bg);
    bgT = 0;
    palette = newPal;
  }
  if(bgT < 1){
    bgT = Math.min(1, bgT + 0.001);
    currentBg = rgbToHex(lerp(bgFrom.r,bgTo.r,bgT),lerp(bgFrom.g,bgTo.g,bgT),lerp(bgFrom.b,bgTo.b,bgT));
  }

  /* Clear */
  ctx.globalAlpha = 1;
  ctx.fillStyle = currentBg;
  ctx.fillRect(0, 0, W, H);

  /* Waves */
  waves.forEach(w => w.draw(ctx, t, palette.primary));

  /* Grand orbe lumineux qui dérive */
  const orbX = W * 0.5 + Math.sin(t * 0.00012) * W * 0.25;
  const orbY = H * 0.45 + Math.cos(t * 0.00009) * H * 0.2;
  const grad = ctx.createRadialGradient(orbX, orbY, 0, orbX, orbY, Math.min(W,H) * 0.45);
  const rgb = hexToRgb(palette.accent);
  grad.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},0.07)`);
  grad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
  ctx.globalAlpha = 1;
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  /* Particles */
  particles.forEach((p, i) => {
    p.update(t);
    p.draw(ctx, palette.primary, particles[i+1]);
  });

  ctx.globalAlpha = 1;
}

window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('touchmove', e => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
}, {passive:false});
window.addEventListener('touchend', () => { mouse.x = -999; mouse.y = -999; });
window.addEventListener('resize', init);

init();
requestAnimationFrame(loop);
</script>
</body>
</html>
