<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Urgent 🚨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --rose:#f2c4d0;
  --rose-deep:#c94070;
  --rose-dark:#7d1d3f;
  --cream:#fdf6f0;
  --ink:#1a0a10;
  --muted:#9a7080;
  --card:#fff9f5;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;height:100%;
  overflow:hidden;
  background:var(--cream);
  font-family:'DM Sans',sans-serif;
  color:var(--ink);
}

/* GRAIN */
body::before{content:'';position:fixed;inset:0;z-index:999;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.3;mix-blend-mode:multiply;}

/* BLOBS */
.bg-blob{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;}
.blob1{width:380px;height:380px;background:radial-gradient(circle,#f9d5e0,transparent 70%);top:-120px;right:-100px;animation:blobDrift 14s ease-in-out infinite alternate;}
.blob2{width:280px;height:280px;background:radial-gradient(circle,#fce4c8,transparent 70%);bottom:-80px;left:-80px;animation:blobDrift 18s ease-in-out infinite alternate-reverse;}
.blob3{width:180px;height:180px;background:radial-gradient(circle,#e8d5f5,transparent 70%);top:40%;left:60%;animation:blobDrift 22s ease-in-out infinite alternate;}
@keyframes blobDrift{0%{transform:translate(0,0);}100%{transform:translate(28px,18px) scale(1.08);}}

/* HEARTS BG */
.hearts-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.heart-float{position:absolute;opacity:.07;color:var(--rose-deep);animation:floatHeart linear infinite;}
@keyframes floatHeart{0%{transform:translateY(100vh) rotate(0deg);opacity:0;}10%{opacity:.07;}90%{opacity:.03;}100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}}

/* PAGE */
.page{
  position:fixed;inset:0;
  display:flex;align-items:center;justify-content:center;
  padding:1rem;z-index:1;
}

/* CARD — taille fixe, pas de scroll */
.card{
  background:var(--card);
  border-radius:22px;
  border:1px solid rgba(201,64,112,.1);
  padding:1.3rem 1.2rem;
  width:100%;max-width:400px;
  box-shadow:0 4px 40px rgba(201,64,112,.08);
  position:relative;
  /* PAS d'overflow scroll */
}
.card::after{content:'';position:absolute;inset:0;border-radius:22px;background:linear-gradient(135deg,rgba(255,255,255,.55) 0%,transparent 55%);pointer-events:none;}

/* ANIMATIONS */
.screen{animation:screenIn .45s cubic-bezier(.22,1,.36,1) both;}
@keyframes screenIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}





/* ══ STEP 1 ══ */
.step1.hidden{display:none;}
.rose-wrap{display:flex;justify-content:center;margin-bottom:.5rem;}
.rose-circle{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#fce4ec,#f9c5d5);display:flex;align-items:center;justify-content:center;font-size:1.6rem;box-shadow:0 5px 20px rgba(201,64,112,.16);animation:rosePulse 3s ease-in-out infinite;}
@keyframes rosePulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
.s1-title{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-style:italic;color:var(--rose-dark);text-align:center;margin-bottom:.9rem;line-height:1.1;}
.info-pills{display:flex;flex-direction:column;gap:5px;margin-bottom:.9rem;}
.pill{display:flex;align-items:center;gap:9px;background:rgba(201,64,112,.06);border:1px solid rgba(201,64,112,.11);border-radius:50px;padding:7px 12px;font-size:.82rem;color:var(--rose-dark);animation:pillIn .4s cubic-bezier(.22,1,.36,1) both;}
.pill:nth-child(1){animation-delay:.05s;}
.pill:nth-child(2){animation-delay:.12s;}
.pill:nth-child(3){animation-delay:.19s;}
@keyframes pillIn{from{opacity:0;transform:translateX(-10px);}to{opacity:1;transform:translateX(0);}}
.pill-icon{flex-shrink:0;width:26px;height:26px;border-radius:50%;background:rgba(201,64,112,.11);display:flex;align-items:center;justify-content:center;}
.pill-icon svg{color:var(--rose-deep);}

.btn-row{display:flex;gap:10px;justify-content:center;margin-bottom:.5rem;min-height:46px;position:relative;}
.btn-yes{background:linear-gradient(135deg,var(--rose-deep),#a02050);color:#fff9f5;border:none;padding:12px 26px;border-radius:50px;font-size:.9rem;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 4px 20px rgba(201,64,112,.32);transition:transform .15s,box-shadow .15s;touch-action:manipulation;}
.btn-yes:active{transform:scale(.97);}
.no-wrapper{position:relative;display:inline-block;}
.btn-no{background:transparent;color:var(--muted);border:1.5px solid rgba(154,112,128,.28);padding:12px 20px;border-radius:50px;font-size:.9rem;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;transition:opacity .18s;touch-action:manipulation;}
@media(hover:hover){.btn-no:hover{opacity:0;pointer-events:none;}}
.no-hint{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:.95rem;color:var(--rose-deep);text-align:center;min-height:20px;opacity:0;letter-spacing:.01em;}
.no-hint.pop{animation:hintIn .5s cubic-bezier(.34,1.56,.64,1) forwards;}
@keyframes hintIn{0%{opacity:0;transform:scale(.5);}60%{opacity:1;transform:scale(1.1);}80%{transform:scale(.96);}100%{opacity:1;transform:scale(1);}}

/* ══ OVERLAY FÊTE ══ */
#partyOverlay{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;background:transparent;}
#partyOverlay.show{pointer-events:all;background:rgba(253,246,240,.9);backdrop-filter:blur(10px);transition:background .3s;}
.party-card{background:var(--card);border-radius:24px;border:1px solid rgba(201,64,112,.14);padding:2.4rem 2rem;max-width:320px;width:88%;text-align:center;box-shadow:0 16px 60px rgba(201,64,112,.18);opacity:0;transform:scale(.72) translateY(16px);transition:opacity .38s cubic-bezier(.22,1,.36,1),transform .38s cubic-bezier(.22,1,.36,1);}
#partyOverlay.show .party-card{opacity:1;transform:scale(1) translateY(0);}
.party-big{font-size:3.8rem;display:block;}
.party-big.bounce{animation:bigBounce .55s cubic-bezier(.34,1.8,.64,1);}
@keyframes bigBounce{0%{transform:scale(0) rotate(-20deg);}70%{transform:scale(1.12) rotate(3deg);}100%{transform:scale(1);}}
.party-title{font-family:'Cormorant Garamond',serif;font-size:1.9rem;font-style:italic;color:var(--rose-dark);margin-top:.7rem;opacity:0;transform:translateY(6px);transition:opacity .3s .2s,transform .3s .2s;}
#partyOverlay.show .party-title{opacity:1;transform:translateY(0);}
.party-sub{font-size:.83rem;color:var(--muted);margin-top:.3rem;opacity:0;transition:opacity .3s .32s;}
#partyOverlay.show .party-sub{opacity:1;}
.float-em{position:fixed;pointer-events:none;z-index:201;animation:floatUp 2s ease-out forwards;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) rotate(0deg);}100%{opacity:0;transform:translateY(-92vh) rotate(40deg);}}

/* ══ STEP 2 ══ */
#step2{display:none;}
.s2-title{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-style:italic;color:var(--rose-dark);text-align:center;margin-bottom:.75rem;}
.date-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:.75rem;}
.date-btn{padding:8px 3px;border-radius:10px;border:1.5px solid rgba(201,64,112,.14);background:#fff;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .18s;touch-action:manipulation;}
.date-btn:active{background:rgba(201,64,112,.06);}
.date-btn.selected{border-color:var(--rose-deep);background:rgba(201,64,112,.07);box-shadow:0 3px 12px rgba(201,64,112,.1);}
.date-btn .dn{font-size:.61rem;color:var(--rose-deep);font-weight:500;text-transform:uppercase;letter-spacing:.07em;}
.date-btn .num{font-size:1.05rem;font-weight:600;color:var(--ink);}
.date-btn .mo{font-size:.61rem;color:var(--muted);}
.date-btn.dis{opacity:.26;cursor:not-allowed;pointer-events:none;}
.time-label{font-size:.68rem;color:var(--muted);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.06em;text-align:center;}
.time-options{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:.75rem;}
.time-section-label{width:100%;font-size:.64rem;color:var(--rose-deep);font-weight:500;text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;text-align:left;}
.time-btn{padding:7px 10px;border-radius:50px;border:1.5px solid rgba(201,64,112,.16);background:#fff;cursor:pointer;font-size:.79rem;color:var(--ink);font-family:'DM Sans',sans-serif;transition:all .15s;touch-action:manipulation;}
.time-btn.selected{background:var(--rose-deep);color:#fff;border-color:var(--rose-deep);font-weight:500;}
.btn-confirm{background:linear-gradient(135deg,var(--rose-deep),#a02050);color:#fff9f5;border:none;padding:12px 36px;border-radius:50px;font-size:.9rem;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;width:100%;box-shadow:0 4px 20px rgba(201,64,112,.28);transition:all .15s;touch-action:manipulation;}
.btn-confirm:disabled{opacity:.3;cursor:not-allowed;box-shadow:none;}

/* ══ STEP 3 ══ */
#step3{display:none;text-align:center;}
.s3-icon{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#fce4ec,#f9c5d5);display:flex;align-items:center;justify-content:center;font-size:1.7rem;margin:0 auto .8rem;box-shadow:0 6px 22px rgba(201,64,112,.16);animation:iconPop .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes iconPop{from{transform:scale(0) rotate(-15deg);}to{transform:scale(1) rotate(0deg);}}
.s3-title{font-family:'Cormorant Garamond',serif;font-size:1.75rem;font-style:italic;color:var(--rose-dark);margin-bottom:.8rem;}
.recap{background:rgba(201,64,112,.04);border-radius:14px;padding:.8rem 1rem;text-align:left;border:1px solid rgba(201,64,112,.09);margin-bottom:.8rem;}
.recap-row{display:flex;align-items:center;gap:8px;font-size:.83rem;color:var(--rose-dark);padding:4px 0;opacity:0;transform:translateX(-7px);}
.recap-row.in{animation:rowIn .38s cubic-bezier(.22,1,.36,1) forwards;}
@keyframes rowIn{to{opacity:1;transform:translateX(0);}}
.recap-row svg{color:var(--rose-deep);flex-shrink:0;}
.badge-wrap{display:flex;justify-content:center;}
.sent-badge{display:inline-flex;align-items:center;gap:7px;background:rgba(201,64,112,.07);color:var(--rose-deep);border:1.5px solid rgba(201,64,112,.18);border-radius:50px;padding:10px 20px;font-size:.86rem;font-weight:500;font-family:'DM Sans',sans-serif;transition:all .5s cubic-bezier(.22,1,.36,1);}
.sent-badge.done{background:#e8f5ec;color:#2d6a3f;border-color:#a8d9b5;transform:scale(1.04);}
.spin{animation:spinAnim 1s linear infinite;}
@keyframes spinAnim{to{transform:rotate(360deg);}}

/* CONFETTI */
.confetti-piece,.streamer,.star-piece{position:fixed;pointer-events:none;z-index:998;}
@keyframes cfall-l{0%{opacity:1;transform:translateY(0) rotate(0deg);}100%{opacity:0;transform:translateY(110vh) translateX(-100px) rotate(-720deg);}}
@keyframes cfall-r{0%{opacity:1;transform:translateY(0) rotate(0deg);}100%{opacity:0;transform:translateY(110vh) translateX(100px) rotate(720deg);}}
@keyframes cfall-s{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(110vh) translateX(50px) rotate(1080deg) scale(.3);}}
@keyframes burst{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--bx),var(--by)) scale(0);}}
@keyframes stream{0%{opacity:1;transform:translateY(0) rotate(var(--rot));}100%{opacity:0;transform:translateY(110vh) rotate(calc(var(--rot) + 540deg));}}
@keyframes starfly{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(var(--sx),var(--sy)) scale(0) rotate(720deg);}}
</style>
<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>
<div class="hearts-bg" id="heartsBg"></div>

<!-- OVERLAY FÊTE -->
<div id="partyOverlay">
  <div class="party-card">
    <span class="party-big" id="partyBig">🎉</span>
    <div class="party-title">Elle a dit oui !!</div>
    <div class="party-sub">Choisis maintenant la date</div>
  </div>
</div>

<div class="page">
<div class="card" id="card">

  <!-- STEP 1 -->
  <div class="step1 screen" id="step1">
    <div class="rose-wrap"><div class="rose-circle">🌹</div></div>
    <h1 class="s1-title"><em>Léa</em> !</h1>
    <div class="info-pills">
      <div class="pill">
        <div class="pill-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
        <span>Le <strong>Grill de Julia</strong> — Cahors</span>
      </div>
      <div class="pill">
        <div class="pill-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
        <span>La semaine prochaine, tu choisis quand</span>
      </div>
      <div class="pill">
        <div class="pill-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg></div>
        <span>Ça te chauffe ?</span>
      </div>
    </div>
    <div class="btn-row" id="btnRow">
      <button class="btn-yes" onclick="sayYes()">Oui, avec plaisir ! 🥰</button>
      <div class="no-wrapper" id="noWrapper">
        <button class="btn-no" id="noBtn" onmouseenter="onNoHover()" onclick="onNoClick()">Non...</button>
      </div>
    </div>
    <p class="no-hint" id="noHint">&nbsp;</p>
  </div>

  <!-- STEP 2 -->
  <div id="step2">
    <h2 class="s2-title">On fait ça quand ?</h2>
    <div class="date-grid" id="dateGrid"></div>
    <span class="time-label">À quelle heure ?</span>
    <div class="time-options" id="timeOptions"></div>
    <button class="btn-confirm" id="confirmBtn" onclick="confirmDate()" disabled>Confirmer ✨</button>
  </div>

  <!-- STEP 3 -->
  <div id="step3">
    <div class="s3-icon">💌</div>
    <h2 class="s3-title">Impeccable !</h2>
    <div class="recap" id="recapBlock"></div>
    <div class="badge-wrap">
      <div class="sent-badge" id="reservBadge">
        <svg class="spin" id="spinIcon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
        <span id="badgeText">Réservation en cours...</span>
      </div>
    </div>
  </div>

</div>
</div>

<script>
const FORM_ACTION="https://docs.google.com/forms/d/e/1FAIpQLSdyTQ2sAY7pW-UIOayydOD-9K_7u-asF08OAdQ9BcSXuLHEKg/formResponse";
const ENTRY_DATE="entry.1202159359",ENTRY_HEURE="entry.1170606869";
const dates=[
  {label:"Mar",num:"2", month:"Juin",disabled:true},
  {label:"Mer",num:"3", month:"Juin",disabled:true},
  {label:"Jeu",num:"4", month:"Juin",disabled:true},
  {label:"Ven",num:"5", month:"Juin",disabled:true},
  {label:"Sam",num:"6", month:"Juin",disabled:false},
  {label:"Mar",num:"9", month:"Juin",disabled:false},
  {label:"Mer",num:"10",month:"Juin",disabled:false},
  {label:"Jeu",num:"11",month:"Juin",disabled:false},
];
const timesSoir=["19h00","19h30","20h00","20h30","21h00","21h30","22h00","22h30"],timesMidi=["12h00","12h30","13h00","13h30","14h00","14h30"];
let selDate=null,selTime=null,hintIdx=0;
const hints=["Allez, t'as envie aussi 🤭","Le bouton se sauve ! 👀","Il disparaît... c'est un signe 🌹","Impossible de cliquer Non 😏","T'as qu'un seul choix possible 💅"];


/* NON */
function onNoHover(){showHint();escapeBtn();}
function onNoClick(){sayYes();}
function showHint(){
  const h=document.getElementById('noHint');
  h.textContent=hints[Math.min(hintIdx,hints.length-1)];
  h.classList.remove('pop');void h.offsetWidth;h.classList.add('pop');hintIdx++;
}
function escapeBtn(){
  const btn=document.getElementById('noBtn'),card=document.getElementById('card'),wr=document.getElementById('noWrapper'),cr=card.getBoundingClientRect();
  wr.style.position='absolute';card.style.position='relative';
  wr.style.left=Math.max(8,Math.random()*(cr.width-130))+'px';
  wr.style.top=Math.max(8,Math.random()*(cr.height-56))+'px';
  wr.style.transform='rotate('+(Math.random()-.5)*16+'deg)';
  btn.style.transform='scale('+Math.max(.55,1-hintIdx*.1)+')';
  btn.style.opacity=Math.max(.2,1-hintIdx*.18);
  if(hintIdx>=hints.length){btn.style.display='none';const h=document.getElementById('noHint');h.textContent="T'as pas le choix 😏";h.classList.remove('pop');void h.offsetWidth;h.classList.add('pop');}
}

/* OUI */
function sayYes(){
  document.getElementById('step1').classList.add('hidden');
  const ov=document.getElementById('partyOverlay');
  ov.classList.add('show');
  setTimeout(()=>document.getElementById('partyBig').classList.add('bounce'),50);
  const ems=['🎊','🎉','💖','🌟','✨','🥂','💃','🎈','💕','🌹'];
  for(let i=0;i<26;i++)setTimeout(()=>{
    const s=document.createElement('span');s.className='float-em';
    s.textContent=ems[Math.floor(Math.random()*ems.length)];
    s.style.cssText=`left:${4+Math.random()*92}vw;bottom:-20px;font-size:${1.2+Math.random()*1.4}rem;animation-duration:${1.3+Math.random()*1.2}s;animation-delay:${Math.random()*.5}s;`;
    ov.appendChild(s);setTimeout(()=>s.remove(),3000);
  },i*75);
  spawnConfetti(140);
  setTimeout(()=>{ov.style.transition='opacity .45s';ov.style.opacity='0';setTimeout(()=>{ov.style.display='none';showStep2();},450);},2600);
}

function showStep2(){
  
  const s2=document.getElementById('step2');s2.style.display='block';s2.classList.add('screen');
  renderDates();renderTimes();
}

/* DATES */
function renderDates(){
  const g=document.getElementById('dateGrid');g.innerHTML='';
  dates.forEach((d,i)=>{
    const b=document.createElement('button');
    b.className='date-btn'+(d.disabled?' dis':'');
    b.innerHTML='<div class="dn">'+d.label+'</div><div class="num">'+d.num+'</div><div class="mo">'+d.month+'</div>';
    if(!d.disabled)b.onclick=()=>{document.querySelectorAll('.date-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');selDate=d;selTime=null;renderTimes();checkConfirm();};
    g.appendChild(b);
  });
}

/* HORAIRES */
function renderTimes(){
  const w=document.getElementById('timeOptions');w.innerHTML='';
  addTimeGroup(w,'Midi',timesMidi);
  const sep=document.createElement('div');sep.style.height='5px';sep.style.width='100%';w.appendChild(sep);
  addTimeGroup(w,'Soir',timesSoir);
}
function addTimeGroup(c,label,times){
  const l=document.createElement('div');l.className='time-section-label';l.textContent=label;c.appendChild(l);
  const r=document.createElement('div');r.style.cssText='display:flex;gap:5px;justify-content:center;flex-wrap:wrap;width:100%;';
  times.forEach(t=>r.appendChild(makeTimeBtn(t,c)));c.appendChild(r);
}
function makeTimeBtn(t,c){
  const b=document.createElement('button');b.className='time-btn';b.textContent=t;
  b.onclick=()=>{c.querySelectorAll('.time-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');selTime=t;checkConfirm();};
  return b;
}
function checkConfirm(){document.getElementById('confirmBtn').disabled=!(selDate&&selTime);}

/* CONFIRMATION */
function confirmDate(){
  submitToForm();
  
  document.getElementById('step2').style.display='none';
  const s3=document.getElementById('step3');s3.style.display='block';s3.classList.add('screen');
  const mk=p=>`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--rose-deep);flex-shrink:0">${p}</svg>`;
  const rows=[
    [mk('<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>'),'Le Grill de Julia, Cahors'],
    [mk('<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>'),selDate.label+' '+selDate.num+' '+selDate.month],
    [mk('<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>'),selTime],
  ];
  const recap=document.getElementById('recapBlock');recap.innerHTML='';
  rows.forEach(([icon,text],i)=>{
    const row=document.createElement('div');row.className='recap-row';
    row.innerHTML=icon+'<span>'+text+'</span>';recap.appendChild(row);
    setTimeout(()=>row.classList.add('in'),i*120+80);
  });
  setTimeout(()=>{
    document.getElementById('spinIcon').style.display='none';
    document.getElementById('badgeText').textContent='Réservé';
    document.getElementById('reservBadge').classList.add('done');
    spawnConfetti(130);
  },5000);
}
function submitToForm(){
  const val=selDate.label+' '+selDate.num+' '+selDate.month+' 2026';
  fetch(FORM_ACTION,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/x-www-form-urlencoded'},body:ENTRY_DATE+'='+encodeURIComponent(val)+'&'+ENTRY_HEURE+'='+encodeURIComponent(selTime)});
}

/* CONFETTI ULTRA */
const COLS=['#f9c5d5','#c94070','#fce4ec','#fbbf24','#c4b5fd','#6ee7b7','#fb7185','#fde68a','#a78bfa','#34d399','#f472b6','#60a5fa'];
const STARS=['✦','★','✸','✺','❋','◆'];
function spawnConfetti(n){
  for(let i=0;i<n;i++)setTimeout(dropOne,i*16);
  setTimeout(()=>burstCenter(35),150);
  setTimeout(()=>spawnStreamers(18),80);
  setTimeout(()=>spawnStars(14),250);
  setTimeout(()=>{for(let i=0;i<n*.5;i++)setTimeout(dropOne,i*20);},550);
}
function dropOne(){
  const el=document.createElement('div');el.className='confetti-piece';
  const sz=5+Math.random()*10,anims=['cfall-l','cfall-r','cfall-s'],a=anims[Math.floor(Math.random()*3)],dur=1.3+Math.random()*1.4,del=Math.random()*.4;
  el.style.cssText=`left:${Math.random()*102}vw;top:-12px;width:${Math.random()>.5?sz*.45:sz}px;height:${Math.random()>.5?sz*2.2:sz*.5+sz*Math.random()}px;background:${COLS[Math.floor(Math.random()*COLS.length)]};animation:${a} ${dur}s ${del}s ease-in forwards;border-radius:${Math.random()>.6?'50%':'2px'};`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),(dur+del+.2)*1000);
}
function burstCenter(n){
  const cx=window.innerWidth/2,cy=window.innerHeight*.4;
  for(let i=0;i<n;i++){
    const el=document.createElement('div');el.className='confetti-piece';
    const angle=(i/n)*Math.PI*2,dist=100+Math.random()*180,sz=7+Math.random()*9;
    el.style.cssText=`left:${cx}px;top:${cy}px;width:${sz}px;height:${sz}px;background:${COLS[Math.floor(Math.random()*COLS.length)]};--bx:${Math.cos(angle)*dist}px;--by:${Math.sin(angle)*dist-60}px;animation:burst ${.5+Math.random()*.5}s ${Math.random()*.12}s ease-out forwards;border-radius:50%;position:fixed;`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),1100);
  }
}
function spawnStreamers(n){
  for(let i=0;i<n;i++){
    const el=document.createElement('div');el.className='streamer';
    const h=35+Math.random()*70,rot=-45+Math.random()*90,dur=1.6+Math.random()*1.2;
    el.style.cssText=`left:${Math.random()*100}vw;top:-${h}px;height:${h}px;width:4px;background:${COLS[Math.floor(Math.random()*COLS.length)]};--rot:${rot}deg;animation:stream ${dur}s ${Math.random()*.35}s ease-in forwards;border-radius:2px;`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),(dur+.5)*1000);
  }
}
function spawnStars(n){
  for(let i=0;i<n;i++)setTimeout(()=>{
    const el=document.createElement('div');el.className='star-piece';
    const angle=Math.random()*Math.PI*2,dist=80+Math.random()*170,dur=.7+Math.random()*.7;
    el.style.cssText=`left:${10+Math.random()*80}vw;top:${10+Math.random()*40}vh;color:${COLS[Math.floor(Math.random()*COLS.length)]};--sx:${Math.cos(angle)*dist}px;--sy:${Math.sin(angle)*dist}px;animation:starfly ${dur}s ease-out forwards;font-size:${1+Math.random()*1.1}rem;`;
    el.textContent=STARS[Math.floor(Math.random()*STARS.length)];
    document.body.appendChild(el);setTimeout(()=>el.remove(),1700);
  },i*55);
}

/* HEARTS */
(function(){
  const bg=document.getElementById('heartsBg'),syms=['♥','✦','·','♡'];
  for(let i=0;i<16;i++){
    const h=document.createElement('span');h.className='heart-float';
    h.textContent=syms[Math.floor(Math.random()*syms.length)];
    h.style.cssText=`left:${Math.random()*100}%;font-size:${.6+Math.random()*1.1}rem;animation-duration:${10+Math.random()*14}s;animation-delay:-${Math.random()*24}s;`;
    bg.appendChild(h);
  }
})();
